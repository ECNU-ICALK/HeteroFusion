experiment_name: paper_multi_source_cross_family
output_dir: outputs/paper/multi_source_cross_family/qwen_target_llama_mistral
base_model_path: "${MODEL_ROOT}/Qwen2.5-7B-Instruct"
initial_target_lora: "${ADAPTER_ROOT}/Qwen2.5/UIE/NER_mit-movie"
data_global:
  dataset_dir: data
  template: qwen
  cutoff_len: 1024
  batch_size: 1
  num_workers: 4
tasks:
- task_name: multi_source_transfer
  source_lora_paths:
  - "${ADAPTER_ROOT}/llama_instruct/NER_TweetNER7_sample_15000_sft"
  - "${ADAPTER_ROOT}/llama_instruct/RE_conll04"
  - "${ADAPTER_ROOT}/llama_instruct/RE_New-York-Times-RE_sample_30000_sft"
  - "${ADAPTER_ROOT}/mistral/ET_Fab/sft"
  - "${ADAPTER_ROOT}/mistral/ET_FindVehicle/sft"
  transfer_ratio: '1'
  datasets:
  - name: TweetNER7_sample_15000_sample300
    type: main
  - name: ET_FindVehicle_sample300
    type: replay
    ratio: all
  - name: RE_conll04_sample300
    type: replay
    ratio: all
  - name: RE_New-York-Times-RE_sample_30000_sample300
    type: replay
    ratio: all
  - name: ET_FabNER_sample300
    type: replay
    ratio: all
  - name: mit-movie_sample300
    type: replay
    ratio: all
  training:
    fusion_group_name: heterofusion_transfer
    embed_dim: 1024
    num_heads: 8
    max_position_embeddings: 4096
    num_epochs: 3
    lr: 5.0e-05
    alpha_init: 0.3
    gradient_accumulation_steps: 8
    mu_gate: 0.1
    lambda_reg: 0.005
    mu_target: 0.0
    sigma_target: 1.0
    num_projections: 2048
